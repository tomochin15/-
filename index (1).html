    <div class="notice">このページを置くことで、情報の扱い方が明確になり、信頼感が上がります。</div>
    <h2>1. 情報の優先順位</h2>
    <ul class="bullet-list">
      <li>最優先は各公式ページ</li>
      <li>次に公式SNSや公式告知</li>
      <li>第三者発信は補助情報として扱う</li>
    </ul>
    <h2>2. Amazonの扱い</h2>
    <p>Amazonは通常販売と招待リクエストを混同しやすいため、このサイトでは招待リクエストのみを中心に整理します。</p>
    <h2>3. 更新方針</h2>
    <p>トップページは速報性、ガイドページは整理性、記事ページは検索性を重視します。</p>
